# Files and resources for external sharing via /share page.
#
# Fields:
#   - title: File/resource name
#   - description: Brief description
#   - link: Download URL (Google Drive, Dropbox, etc.)
#   - date: Upload date (optional)
#   - icon: Font Awesome icon name without 'fa-' (optional)
#           Examples: file-pdf, file-archive, file-code, folder, link
# =============================================================================

- title: "CV"
  description: "Curriculum Vitae (English)"
  link: "/assets/cv/CV.pdf"
  icon: "file-pdf"

